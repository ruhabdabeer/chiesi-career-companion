<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chiesi Career Companion</title>

<style>

/* =========================
   BASE LAYOUT (FIXED)
========================= */

body{
    margin:0;
    font-family:Arial;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;

    isolation:isolate;
}

/* =========================
   ANIMATED BACKGROUND
========================= */

body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-3;
    pointer-events:none;

    background:linear-gradient(
        135deg,
        #1b0010,
        #2b0018,
        #4a0128,
        #610233,
        #4a0128,
        #2b0018
    );

    background-size:400% 400%;
    animation:chatBackground 14s ease infinite;
}

/* =========================
   MAIN ORB (TOP LEFT)
========================= */

body::after{
    content:"";
    position:fixed;
    width:700px;
    height:700px;

    border-radius:50%;

    background:rgba(181,2,95,0.18);
    filter:blur(120px);

    top:-250px;
    left:-200px;

    animation:orbFloat 12s ease-in-out infinite alternate;

    z-index:-2;
    pointer-events:none;
}

/* =========================
   ORB 2 (BOTTOM RIGHT)
========================= */

.orb2{
    position:fixed;
    width:800px;
    height:800px;

    border-radius:50%;

    background:rgba(67,138,162,0.15);
    filter:blur(140px);

    bottom:-300px;
    right:-300px;

    animation:orbFloat2 16s ease-in-out infinite alternate;

    z-index:-2;
    pointer-events:none;
}

/* =========================
   ORB 3 (CENTER SOFT GLOW)
========================= */

.orb3{
    position:fixed;
    width:600px;
    height:600px;

    border-radius:50%;

    background:rgba(255,255,255,0.04);
    filter:blur(120px);

    top:40%;
    left:50%;

    transform:translate(-50%,-50%);
    animation:orbFloat3 18s ease-in-out infinite alternate;

    z-index:-2;
    pointer-events:none;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes chatBackground{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes orbFloat{
    0%{transform:translate(0,0);}
    100%{transform:translate(250px,150px);}
}

@keyframes orbFloat2{
    0%{transform:translate(0,0);}
    100%{transform:translate(-300px,-150px);}
}

@keyframes orbFloat3{
    0%{transform:translate(-50%,-50%);}
    100%{transform:translate(-20%,-80%);}
}

/* =========================
   HEADER
========================= */

.header{
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    padding:15px;
    display:flex;
    align-items:center;
    gap:12px;

    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{height:65px;}

.header-text{
    display:flex;
    flex-direction:column;
}

.title{font-size:20px;font-weight:bold;}
.subtitle{font-size:13px;color:#aaa;}

/* =========================
   TOP MENU
========================= */

.top-menu{
    position:fixed;
    top:15px;
    right:15px;
    z-index:10;
}

/* =========================
   CHAT
========================= */

#chatbox{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;

    background:rgba(0,0,0,0.04);
    backdrop-filter:blur(8px);
}

/* =========================
   MESSAGES
========================= */

.message{
    max-width:85%;
    padding:14px;
    border-radius:14px;
    white-space:pre-wrap;
    word-wrap:break-word;
    line-height:1.4;
}

.user{
    align-self:flex-end;
    background:white;
    color:black;
}

.bot{
    align-self:flex-start;

    background:rgba(181,2,95,0.75);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:none;
}

/* =========================
   BUTTONS
========================= */

.btn{
    background:#b5025f;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    margin:6px 0;
    width:100%;
    max-width:420px;
    font-weight:bold;
    text-align:center;

    box-shadow:none;
}

.btn:hover{
    background:#246a82;
    transform:translateY(-2px);
    box-shadow:none;
}

/* =========================
   INPUT
========================= */

#msg{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#000;
    color:white;
    outline:none;
}

</style>

</head>

<body>

<!-- ORBS (ONLY ONCE — IMPORTANT FIX) -->
<div class="orb2"></div>
<div class="orb3"></div>

<!-- TOP MENU -->
<div class="top-menu">
<button class="btn" onclick="window.location='/'">🏠 Main Menu</button>
</div>

<!-- HEADER -->
<div class="header">
<img src="/static/logo.png" class="logo">

<div class="header-text">
<div class="title">Chiesi Career Companion</div>
<div class="subtitle">Explore careers, pathways & skills</div>
</div>
</div>

<!-- CHAT -->
<div id="chatbox">

<div class="message bot">
Hello! 👋 I'm Chiesi Career Companion.<br><br>

I help you explore careers, skills and pathways at Chiesi.<br><br>

Whenever you're ready, click the YES button or type YES to begin.

<button class="btn" onclick="sendMessage('YES')">YES</button>
</div>

</div>

<!-- INPUT -->
<div style="
display:flex;
padding:12px;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(20px);
">

<input id="msg" placeholder="Type..." onkeypress="if(event.key==='Enter'){send();}">
<button class="btn" style="width:120px;" onclick="send()">Send</button>

</div>

<script>

function goToMenu(){

    const botMessages = document.querySelectorAll(".bot");
    const lastBot = botMessages[botMessages.length - 1];

    if(lastBot){
        lastBot.innerHTML = "Loading menu...";
    }

    fetch("/get",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:"yes"})
    })
    .then(r=>r.json())
    .then(d=>{
        if(lastBot){
            lastBot.innerHTML = d.response;
        }
    });
}

function replaceLastBot(text){

    if(text === "yes"){
        goToMenu();
        return;
    }

    const botMessages = document.querySelectorAll(".bot");
    const lastBot = botMessages[botMessages.length - 1];

    if(lastBot){
        lastBot.innerHTML = "Thinking...";
    }

    fetch("/get",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:text})
    })
    .then(r=>r.json())
    .then(d=>{
        if(lastBot){
            lastBot.innerHTML = d.response;
        }
    });
}

function addMessage(text,type){
    const box=document.getElementById("chatbox");
    const div=document.createElement("div");
    div.className="message "+type;
    div.innerHTML=text;
    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
    return div;
}

function sendMessage(text){
    document.getElementById("msg").value=text;
    send();
}

function send(){
    let input=document.getElementById("msg");
    let msg=input.value.trim();
    if(!msg) return;

    addMessage(msg,"user");
    input.value="";

    let bot=addMessage("Thinking...","bot");

    fetch("/get",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
    })
    .then(r=>r.json())
    .then(d=>{
        bot.innerHTML=d.response;
    });
}

</script>

</body>
</html>
